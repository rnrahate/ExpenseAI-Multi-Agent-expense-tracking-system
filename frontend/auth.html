<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseAI — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">💸</div>
        <h1>Expense<span>AI</span></h1>
        <p>Agentic AI-powered expense intelligence</p>
      </div>

      <div class="auth-card">
        <div class="tab-switcher">
          <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <div class="form-group">
            <label>Email or Phone</label>
            <input type="text" id="loginIdentifier" placeholder="email@example.com or +91..." autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
          </div>
          <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign In →</button>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="John" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="john@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="signupPhone" placeholder="+91 9876543210" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Minimum 6 characters" autocomplete="new-password" />
          </div>
          <button class="btn-primary" id="signupBtn" onclick="handleSignup()">Create Account →</button>
        </div>

        <div id="authMessage" class="auth-message"></div>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
